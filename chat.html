<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos — Argentina en Casa 🇦🇷</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul:    #1a2744;
      --celeste: #74ACDF;
      --crema:   #fdf8f0;
      --wa:      #25d366;
      --wa-dark: #128c5a;
      --borde:   #e5e0d8;
      --suave:   #6b7280;
      --texto:   #1c1c1e;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--crema);
      color: var(--texto);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: var(--azul);
      color: white;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .header-back {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .header-back:hover { color: white; }

    .header-divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.2);
    }

    .header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--celeste);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-name { font-weight: 600; font-size: 0.95rem; }
    .header-status { font-size: 0.72rem; color: rgba(255,255,255,0.65); display: flex; align-items: center; gap: 4px; }
    .header-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--wa); display: inline-block; }

    /* ── CHAT AREA ── */
    .chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      scroll-behavior: smooth;
    }

    /* ── BUBBLES ── */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }
    .bubble-row.user { justify-content: flex-end; }

    .bubble-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--celeste);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 78%;
      padding: 0.55rem 0.9rem;
      border-radius: 18px;
      font-size: 0.88rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .bubble.bot {
      background: white;
      border: 1px solid var(--borde);
      border-bottom-left-radius: 4px;
      color: var(--texto);
    }

    .bubble.user {
      background: var(--azul);
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* ── TYPING ── */
    .typing-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--suave);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.8); opacity: .5; } 40% { transform: scale(1.1); opacity: 1; } }

    /* ── SUGERENCIAS RÁPIDAS ── */
    .sugerencias {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.5rem 1rem 0;
    }

    .sug-btn {
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--celeste);
      background: white;
      color: var(--azul);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
    }
    .sug-btn:hover { background: var(--celeste); color: white; }

    /* ── ORDER CARD ── */
    .order-card {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 14px;
      padding: 1rem;
      margin: 0.5rem 0;
      max-width: 92%;
    }

    .order-card-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #2e7d32;
      margin-bottom: 0.6rem;
    }

    .order-card-body {
      font-size: 0.82rem;
      color: var(--texto);
      line-height: 1.65;
      margin-bottom: 0.75rem;
      white-space: pre-wrap;
    }

    .btn-wa-order {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--wa);
      color: white;
      text-decoration: none;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 600;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-wa-order:hover { background: var(--wa-dark); transform: scale(1.02); }

    /* ── INPUT BAR ── */
    .input-bar {
      background: white;
      border-top: 1px solid var(--borde);
      padding: 0.6rem 0.75rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-shrink: 0;
    }

    .msg-input {
      flex: 1;
      padding: 0.55rem 0.85rem;
      border: 1px solid var(--borde);
      border-radius: 999px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      color: var(--texto);
      background: var(--crema);
      outline: none;
      transition: border-color 0.2s;
    }
    .msg-input:focus { border-color: var(--celeste); background: white; }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--azul);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: #2c4a7c; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── WELCOME SCREEN ── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .welcome-flag { font-size: 3rem; margin-bottom: 0.75rem; }
    .welcome-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--azul); margin-bottom: 0.4rem; }
    .welcome-sub { font-size: 0.88rem; color: var(--suave); margin-bottom: 1.5rem; max-width: 300px; line-height: 1.55; }

    .welcome-products {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      max-width: 360px;
    }

    .welcome-product-pill {
      background: white;
      border: 1px solid var(--borde);
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.78rem;
      color: var(--azul);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: all 0.18s;
    }
    .welcome-product-pill:hover {
      background: var(--azul);
      color: white;
      border-color: var(--azul);
      transform: scale(1.03);
    }

    .start-btn {
      background: var(--azul);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 0.7rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .start-btn:hover { background: #2c4a7c; transform: translateY(-1px); }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" class="header-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </a>
    <div class="header-divider"></div>
    <div class="header-avatar">🇦🇷</div>
    <div class="header-info">
      <div class="header-name">Argentina en Casa</div>
      <div class="header-status">Asistente de pedidos</div>
    </div>
  </div>

  <!-- WELCOME -->
  <div class="welcome" id="welcome">
    <div class="welcome-flag">🧉</div>
    <h1 class="welcome-title">¿Qué querés pedir hoy?</h1>
    <p class="welcome-sub">Nuestro asistente te ayuda a armar tu pedido y te manda el resumen directo por WhatsApp.</p>
    <div class="welcome-products" id="welcomeProducts"></div>
    <button class="start-btn" id="startBtn">Iniciar pedido 💬</button>
  </div>

  <!-- CHAT (oculto al inicio) -->
  <div class="chat-wrap" id="chatWrap" style="display:none"></div>

  <div class="sugerencias" id="sugerencias" style="display:none">
    <button class="sug-btn" data-msg="¿Qué productos tienen disponibles?">Ver catálogo</button>
    <button class="sug-btn" data-msg="Quiero yerba mate">Quiero yerba</button>
    <button class="sug-btn" data-msg="Quiero Fernet Branca">Quiero Fernet</button>
    <button class="sug-btn" data-msg="¿Cuánto sale el alfajor?">Precio alfajor</button>
    <button class="sug-btn" data-msg="Ya terminé mi pedido">Cerrar pedido</button>
  </div>

  <div class="input-bar" id="inputBar" style="display:none">
    <input
      type="text"
      class="msg-input"
      id="msgInput"
      placeholder="Escribí tu mensaje..."
      autocomplete="off"
    />
    <button class="send-btn" id="sendBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const WA_NUMBER = '5491130810702';
    const PRODUCTOS_DISPONIBLES = [
      'Yerba Playadito 1kg — €10',
      'Yerba Amanda 1kg — €11',
      'Yerba Rosamonte 1kg — €12',
      'Fernet Branca 70cl — €30',
      'Chocolinas 150g — €3',
      'Alfajor Havanna Negro — €4',
      'Alfajor Havanna Blanco — €4',
      'Bizcochitos Agridulces 200g — €5',
    ];

    let historial = [];
    let cargando = false;

    // Welcome pills — clickeables
    const wp = document.getElementById('welcomeProducts');
    PRODUCTOS_DISPONIBLES.forEach(p => {
      const pill = document.createElement('button');
      pill.className = 'welcome-product-pill';
      pill.textContent = p;
      // Extraer solo el nombre del producto (sin precio)
      const nombreProducto = p.split(' — ')[0];
      pill.addEventListener('click', () => {
        iniciarChat(`Quiero pedir: ${nombreProducto}`);
      });
      wp.appendChild(pill);
    });

    // Start
    document.getElementById('startBtn').addEventListener('click', () => iniciarChat(null));

    function iniciarChat(mensajeInicial) {
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('chatWrap').style.display = 'flex';
      document.getElementById('sugerencias').style.display = 'flex';
      document.getElementById('inputBar').style.display = 'flex';
      document.getElementById('msgInput').focus();
      enviarMensaje(mensajeInicial || 'Hola! Quiero hacer un pedido.');
    }

    // Input
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');

    input.addEventListener('input', () => {
      sendBtn.disabled = !input.value.trim() || cargando;
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && !cargando) {
        e.preventDefault();
        const txt = input.value.trim();
        if (txt) enviarMensaje(txt);
      }
    });

    sendBtn.addEventListener('click', () => {
      const txt = input.value.trim();
      if (txt && !cargando) enviarMensaje(txt);
    });

    document.getElementById('sugerencias').addEventListener('click', e => {
      const btn = e.target.closest('.sug-btn');
      if (btn && !cargando) enviarMensaje(btn.dataset.msg);
    });

    // Render bubble
    function addBubble(role, text) {
      const chat = document.getElementById('chatWrap');

      // Check if order is complete
      if (role === 'bot' && text.includes('PEDIDO_LISTO')) {
        const idx = text.indexOf('PEDIDO_LISTO');
        const before = text.substring(0, idx).trim();
        const orderRaw = text.substring(idx + 'PEDIDO_LISTO'.length).trim();

        if (before) {
          const row = document.createElement('div');
          row.className = 'bubble-row';
          row.innerHTML = `
            <div class="bubble-avatar">🇦🇷</div>
            <div class="bubble bot">${before}</div>
          `;
          chat.appendChild(row);
        }

        const card = document.createElement('div');
        card.className = 'order-card';
        const waMsg = '🛒 NUEVO PEDIDO - Argentina en Casa\n\n' + orderRaw;
        card.innerHTML = `
          <div class="order-card-title">✅ Pedido confirmado</div>
          <div class="order-card-body">${orderRaw}</div>
          <a class="btn-wa-order" href="https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waMsg)}" target="_blank" rel="noopener">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 0C5.373 0 0 5.373 0 12c0 2.125.558 4.122 1.533 5.857L0 24l6.335-1.518A11.946 11.946 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.003-1.364l-.358-.213-3.762.9.966-3.666-.234-.376A9.818 9.818 0 1112 21.818z"/></svg>
            Enviar pedido por WhatsApp
          </a>
        `;
        chat.appendChild(card);
        chat.scrollTop = chat.scrollHeight;
        return;
      }

      const row = document.createElement('div');
      row.className = `bubble-row${role === 'user' ? ' user' : ''}`;
      if (role === 'bot') {
        row.innerHTML = `<div class="bubble-avatar">🇦🇷</div><div class="bubble bot">${text}</div>`;
      } else {
        row.innerHTML = `<div class="bubble user">${text}</div>`;
      }
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
      const chat = document.getElementById('chatWrap');
      const row = document.createElement('div');
      row.className = 'bubble-row';
      row.id = 'typing';
      row.innerHTML = `
        <div class="bubble-avatar">🇦🇷</div>
        <div class="bubble bot" style="padding:.6rem .9rem">
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      `;
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function enviarMensaje(texto) {
      if (cargando) return;
      cargando = true;
      sendBtn.disabled = true;
      input.value = '';

      addBubble('user', texto);
      historial.push({ role: 'user', content: texto });

      addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: historial })
        });

        const data = await res.json();
        removeTyping();

        const reply = data.content?.[0]?.text || 'Disculpá, hubo un error. Intentá de nuevo.';
        historial.push({ role: 'assistant', content: reply });
        addBubble('bot', reply);
      } catch (err) {
        removeTyping();
        addBubble('bot', 'Disculpá, hubo un problema de conexión. Intentá de nuevo en unos segundos.');
      }

      cargando = false;
      sendBtn.disabled = !input.value.trim();
      input.focus();
    }
  </script>
</body>
</html>
